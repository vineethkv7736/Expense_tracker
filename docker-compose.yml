services:

  postgres:
    image: postgres:17

    container_name: expense_postgres

    environment:
      POSTGRES_DB: expense_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  bot:
    build: .

    container_name: expense_bot

    env_file:
      - .env

    depends_on:
      - postgres

    restart: unless-stopped

volumes:
  postgres_data: